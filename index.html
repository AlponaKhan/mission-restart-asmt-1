<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- font roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="index.css"></script>

    <title>SwiftCart</title>
</head>

<body>
    <header>
        <!-- Navbar -->
        <div class="navbar md:w-8/12 md:mx-auto">
            <div class="navbar-start">
                <a class="btn btn-ghost text-xl text-blue-700 font-bold">SwiftCart</a>
            </div>
            <div class="navbar-center hidden lg:flex">
                <ul class="text-lg font-semibold flex gap-4 text-slate-500">
                    <li>Home</li>
                    <li>Products</li>
                    <li>About</li>
                    <li>Contact</li>
                </ul>
            </div>
            <div class="navbar-end">
                <i class="fa-solid fa-cart-shopping"></i>
                <!-- drop down -->
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                        <li>Home</li>
                        <li>Products</li>
                        <li>About</li>
                        <li>Contact</li>
                    </ul>
                </div>
            </div>
        </div>
        <!-- Hero -->
        <div class="bg-[url(Assets/banner-image.png)] bg-no-repeat bg-center md:h-screen md:bg-cover relative flex items-center">
            <div class="bg-gradient-to-r from-gray-800 to-gray-300/40 absolute  h-full w-full "></div>
            <div class="relative md:ml-11 md:pl-40 mx-auto pl-5 py-32">
                <h2 class=" text-3xl md:text-7xl font-extrabold text-white">Best Collection For You</h2>
                <p class="text-xl py-4 text-white">Discover the latest trends in fashion, electronics and more.Shop with
                    confident
                    and style at SwiftCart.</p>
                <button class="btn btn-primary">Shop Now</button>
            </div>

        </div>
    </header>

</body>

</html>
